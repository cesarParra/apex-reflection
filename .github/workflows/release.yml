name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./js/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Version v$VERSION already exists"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION detected"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"

          # The package is distributed purely as a WebAssembly module bundled
          # inside the npm tarball.
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --target main

  publish-npm:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: js
        run: npm ci

      - name: Build package
        working-directory: js
        run: npm run build

      - name: Publish to npm
        working-directory: js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
