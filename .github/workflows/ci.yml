name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use the latest version of the SDK
      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Install dependencies
        run: dart pub get

      - name: Analyze project source
        run: dart analyze

      - name: Run tests
        run: dart test

      # Node.js package tests.
      # Node 24 is required: the wasm module needs WasmGC (Node >= 22) and the
      # test runner strips types from .mts files by default (Node >= 23.6).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node.js dependencies
        working-directory: js
        run: npm ci

      # `npm test` builds the package (compiles the TS wrapper and copies the
      # committed node.wasm into dist/) and then runs the end-to-end tests.
      - name: Run end-to-end tests
        working-directory: js
        run: npm test
